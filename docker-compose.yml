services:
  postgres:
    image: postgres:16-alpine
    container_name: dharsan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dharsan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-dharsan_dresses}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dharsan}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dharsan-net

  # ─── ONE-SHOT INIT ─────────────────────────────────────────────────────
  # Applies the Prisma schema and runs the seed (idempotent via upsert).
  # Runs on every `docker compose up` and exits. The app only starts after this completes.
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: dharsan-db-init
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - dharsan-net
    restart: "no"
    command:
      - sh
      - -c
      - |
        set -e
        echo '→ Applying Prisma schema (db push)…'
        npx prisma db push --accept-data-loss --skip-generate
        echo '→ Seeding initial data (idempotent)…'
        npx tsx prisma/seed.ts
        echo '✓ db-init completed'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dharsan-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    env_file:
      - .env
    networks:
      - dharsan-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://0.0.0.0:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: dharsan-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - dharsan-net

volumes:
  # Named volume — survives `docker compose down`, `restart`, and container removal.
  # Only deleted by `docker compose down -v` or `docker volume rm` — NEVER run those in production.
  postgres_data:
    driver: local

networks:
  dharsan-net:
    driver: bridge
